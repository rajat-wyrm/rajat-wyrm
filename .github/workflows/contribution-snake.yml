name: Generate Snake Animation

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        with:
          github_user_name: rajat-wyrm
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=orange&color_dots=#1a1a2e,#16213e,#0f3460,#e94560,#533483
            dist/github-contribution-grid-snake.svg?color_snake=white&color_dots=#e4e2e2,#58a6ff,#1f6feb,#388bfd,#0550ae
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
